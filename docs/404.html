<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>eXeConvert se ha movido</title>
    <link rel="canonical" href="https://execonvert.github.io/" />
    <script>
      const target =
        "https://execonvert.github.io" +
        window.location.pathname.replace(/^\/eXeConvert/, "") +
        window.location.search +
        window.location.hash;
      window.location.replace(target);
    </script>
  </head>
  <body>
    <p>
      eXeConvert se ha movido a
      <a href="https://execonvert.github.io/">https://execonvert.github.io/</a>.
    </p>
  </body>
</html>
